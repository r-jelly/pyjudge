{% extends "base.html" %}
{% block title %}문제 목록 - PyJudge{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 fw-bold"><i class="bi bi-list-ul me-2"></i>문제 목록</h4>
      <a href="/problems/create" class="btn btn-primary btn-sm" id="btn-create">
        <i class="bi bi-plus-circle me-1"></i>문제 만들기
      </a>
    </div>

    <!-- Difficulty filter -->
    <div class="btn-group mb-3" role="group">
      <button class="btn btn-sm btn-outline-secondary active" data-filter="">전체</button>
      <button class="btn btn-sm btn-outline-success" data-filter="easy">쉬움</button>
      <button class="btn btn-sm btn-outline-warning" data-filter="medium">보통</button>
      <button class="btn btn-sm btn-outline-danger" data-filter="hard">어려움</button>
    </div>

    <!-- Problem table -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div id="loading" class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm me-2"></div>불러오는 중...
        </div>
        <table class="table table-hover mb-0 d-none" id="problem-table">
          <thead class="table-dark">
            <tr>
              <th class="text-center" style="width:60px">#</th>
              <th>제목</th>
              <th class="text-center" style="width:90px">난이도</th>
              <th class="text-center" style="width:100px">정답률</th>
              <th class="text-center" style="width:80px">제출 수</th>
              <th class="text-center" style="width:110px">출제자</th>
            </tr>
          </thead>
          <tbody id="problem-tbody"></tbody>
        </table>
        <div id="empty-msg" class="text-center py-5 text-muted d-none">
          <i class="bi bi-inbox fs-1"></i>
          <p class="mt-2">문제가 없습니다. 첫 번째 문제를 만들어보세요!</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let allProblems = [];
  let currentFilter = "";

  const DIFFICULTY_BADGE = {
    easy:   '<span class="badge bg-success">쉬움</span>',
    medium: '<span class="badge bg-warning text-dark">보통</span>',
    hard:   '<span class="badge bg-danger">어려움</span>',
  };

  const STATUS_ICONS = {
    accepted:             '<i class="bi bi-check-circle-fill text-success" title="맞았습니다"></i>',
    wrong_answer:         '<i class="bi bi-x-circle-fill text-danger" title="틀렸습니다"></i>',
    time_limit_exceeded:  '<i class="bi bi-clock-fill text-warning" title="시간 초과"></i>',
    runtime_error:        '<i class="bi bi-exclamation-circle-fill text-secondary" title="런타임 에러"></i>',
  };

  async function loadProblems() {
    const res = await fetch("/api/problems");
    allProblems = await res.json();
    renderTable(allProblems);
  }

  function renderTable(problems) {
    const tbody = document.getElementById("problem-tbody");
    const table = document.getElementById("problem-table");
    const empty = document.getElementById("empty-msg");
    document.getElementById("loading").classList.add("d-none");

    if (!problems.length) {
      empty.classList.remove("d-none");
      table.classList.add("d-none");
      return;
    }

    empty.classList.add("d-none");
    table.classList.remove("d-none");

    tbody.innerHTML = problems.map((p, i) => `
      <tr class="cursor-pointer" onclick="window.location='/problems/${p.id}'">
        <td class="text-center text-muted">${i + 1}</td>
        <td><a href="/problems/${p.id}" class="text-decoration-none fw-semibold">${escHtml(p.title)}</a></td>
        <td class="text-center">${DIFFICULTY_BADGE[p.difficulty] || p.difficulty}</td>
        <td class="text-center">${p.acceptance_rate}%</td>
        <td class="text-center text-muted">${p.submission_count}</td>
        <td class="text-center text-muted small">${escHtml(p.author_username)}</td>
      </tr>
    `).join("");
  }

  // Filter buttons
  document.querySelectorAll("[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      const filtered = currentFilter
        ? allProblems.filter(p => p.difficulty === currentFilter)
        : allProblems;
      renderTable(filtered);
    });
  });

  // Auth guard for "문제 만들기"
  if (!localStorage.getItem("token")) {
    document.getElementById("btn-create").href = "/login";
  }

  loadProblems();
</script>
{% endblock %}

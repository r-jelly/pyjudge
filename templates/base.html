<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Python Judge{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-code-square me-1"></i>PyJudge
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="/problems">문제 목록</a></li>
      <li class="nav-item" id="nav-create" style="display:none">
        <a class="nav-link" href="/problems/create"><i class="bi bi-plus-circle me-1"></i>문제 만들기</a>
      </li>
    </ul>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item" id="nav-user-info" style="display:none">
        <span class="navbar-text text-light me-3">
          <i class="bi bi-person-circle me-1"></i><span id="nav-username"></span>
        </span>
      </li>
      <li class="nav-item" id="nav-logout" style="display:none">
        <button class="btn btn-sm btn-outline-light" onclick="logout()">로그아웃</button>
      </li>
      <li class="nav-item" id="nav-login" style="display:none">
        <a class="btn btn-sm btn-outline-light me-2" href="/login">로그인</a>
      </li>
      <li class="nav-item" id="nav-register" style="display:none">
        <a class="btn btn-sm btn-primary" href="/register">회원가입</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.js"></script>
<script src="/static/js/app.js"></script>
<script>
  // Update navbar based on auth state
  (function () {
    const token = localStorage.getItem("token");
    const username = localStorage.getItem("username");
    if (token) {
      document.getElementById("nav-create").style.display = "";
      document.getElementById("nav-user-info").style.display = "";
      document.getElementById("nav-logout").style.display = "";
      document.getElementById("nav-username").textContent = username || "";
    } else {
      document.getElementById("nav-login").style.display = "";
      document.getElementById("nav-register").style.display = "";
    }
  })();

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    window.location.href = "/";
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
